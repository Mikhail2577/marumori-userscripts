<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>MaruMori browser contract fixture</title>
        <style>
            html,
            body {
                min-height: 100%;
            }

            body {
                margin: 0;
                padding: 24px;
                background: #121827;
                color: #f4f7ff;
                font:
                    16px/1.4 system-ui,
                    sans-serif;
            }

            #time-me {
                max-width: 720px;
                min-height: 260px;
                margin-left: 320px;
                padding: 24px;
                border: 1px solid #506383;
                border-radius: 12px;
                background: #1a2335;
            }

            #main {
                display: grid;
                min-height: 80px;
                place-items: center;
            }

            .top_middle {
                margin-bottom: 20px;
                font-weight: 700;
            }

            .input-wrapper {
                display: grid;
                gap: 12px;
                min-height: 140px;
                padding: 18px;
                border: 2px solid #7183a2;
                border-radius: 8px;
            }

            .input-wrapper.correct {
                border-color: #55d98b;
            }

            .input-wrapper.incorrect {
                border-color: #ff6b7f;
            }

            .fixture-controls {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }

            input,
            button {
                min-height: 36px;
                font: inherit;
            }
        </style>
    </head>
    <body>
        <section id="time-me" data-session-id="fixture-session-1">
            <div class="top_middle">0 / 3</div>
            <div class="quiz_progress"><div class="quiz_progress_bar"></div></div>
            <div class="page_wrapper">
                <div class="top_wrap">
                    <main id="main"><span>問</span></main>
                    <div class="item_types"></div>
                    <section
                        class="input-wrapper meaning"
                        data-fixture-item="1"
                        data-fixture-layout="meaning"
                    >
                        <label>
                            Answer
                            <input id="answer" type="text" autocomplete="off" />
                        </label>
                        <div class="fixture-controls">
                            <button type="button" data-action="check">Check</button>
                            <button type="button" data-action="wrong">Wrong</button>
                            <button type="button" data-action="next">Next</button>
                            <button type="button" data-action="undo">Undo</button>
                        </div>
                    </section>
                </div>
            </div>
        </section>
        <div id="modals"></div>
        <script src="/browser-fixture/gm-shim.js"></script>
        <script src="/browser-fixture/fixture-host.js"></script>
        <script src="/browser-fixture/userscript.js"></script>
    </body>
</html>
